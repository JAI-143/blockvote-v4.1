<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Officer Login — BlockVote</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--surface:#ffffff;--border:#e2e8f0;
  --primary:#2563eb;--primary-d:#1d4ed8;--primary-l:#eff6ff;--primary-lb:#bfdbfe;
  --text:#0f172a;--muted:#64748b;--red:#dc2626;--red-l:#fef2f2;--red-lb:#fecaca;
  --green:#16a34a;--green-l:#f0fdf4;--green-lb:#bbf7d0;
  --amber:#d97706;--amber-l:#fffbeb;--amber-lb:#fde68a;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 40px rgba(0,0,0,.12);
}
body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;
  display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.logo{font-size:.85rem;font-weight:800;color:var(--primary);letter-spacing:.05em;text-transform:uppercase}
.back{font-size:.78rem;color:var(--muted);text-decoration:none;font-weight:500}
.back:hover{color:var(--primary)}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:var(--surface);border-radius:16px;padding:2.5rem;width:100%;max-width:430px;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.card-icon{width:50px;height:50px;background:var(--primary-l);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:1.4rem}
.eyebrow{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);margin-bottom:.4rem}
.title{font-size:1.6rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.4rem}
.sub{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:1.6rem}
.divider{height:1px;background:var(--border);margin-bottom:1.6rem}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:.72rem;font-weight:600;color:var(--text);letter-spacing:.04em;text-transform:uppercase;margin-bottom:.38rem}
.field input{width:100%;padding:.72rem 1rem;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:.92rem;font-family:inherit;outline:none;transition:.2s}
.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
.btn{width:100%;padding:.82rem;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;margin-top:.4rem}
.btn:hover:not(:disabled){background:var(--primary-d)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.alert{padding:.72rem 1rem;border-radius:8px;font-size:.8rem;margin-bottom:.9rem;display:none;line-height:1.5}
.alert.err{background:var(--red-l);border:1px solid var(--red-lb);color:var(--red);display:block}
.alert.ok{background:var(--green-l);border:1px solid var(--green-lb);color:var(--green);display:block}
.alert.warn{background:var(--amber-l);border:1px solid var(--amber-lb);color:var(--amber);display:block}
.toggle-sec{margin-top:1.4rem;padding-top:1.4rem;border-top:1px solid var(--border)}
.toggle-btn{background:none;border:none;color:var(--muted);font-size:.78rem;cursor:pointer;font-family:inherit;font-weight:500;padding:0}
.toggle-btn:hover{color:var(--primary)}
.reg-panel{display:none;margin-top:1.1rem}
.reg-panel.show{display:block}
.lock-note{display:flex;align-items:flex-start;gap:.6rem;margin-top:1.3rem;padding:.85rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--bg)}
.lock-note svg{flex-shrink:0;color:var(--muted);margin-top:.1rem}
.lock-note p{font-size:.74rem;color:var(--muted);line-height:1.55}
</style>
</head>
<body>
<nav>
  <div class="logo">◆ BlockVote</div>
  <a href="/" class="back">← Home</a>
</nav>
<div class="page">
  <div class="card">
    <div class="card-icon">🔐</div>
    <div class="eyebrow">ECI Officials Only</div>
    <div class="title">Election Officer Login</div>
    <p class="sub">Full access to voter management, elections, candidates, and analytics.</p>
    <div class="divider"></div>
    <div class="alert" id="alertBox"></div>
    <div class="field"><label>Officer ID</label><input type="text" id="oid" placeholder="e.g. OFF001" autocomplete="off"></div>
    <div class="field"><label>Password</label><input type="password" id="opw" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Login to Officer Portal →</button>
    <div class="toggle-sec">
      <button class="toggle-btn" onclick="document.getElementById('regPanel').classList.toggle('show')">+ Register new officer account</button>
      <div class="reg-panel" id="regPanel">
        <div style="height:1px;background:var(--border);margin:.9rem 0"></div>
        <div class="alert" id="regAlert"></div>
        <div class="field"><label>New Officer ID</label><input type="text" id="noid" placeholder="OFF002"></div>
        <div class="field"><label>Full Name</label><input type="text" id="noname"></div>
        <div class="field"><label>Designation</label><input type="text" id="nodesig" placeholder="Returning Officer"></div>
        <div class="field"><label>Password</label><input type="password" id="nopw" placeholder="Min 6 chars"></div>
        <div class="field"><label>ECI Authorization Code</label><input type="password" id="nocode" placeholder="Required"></div>
        <button class="btn" onclick="doRegister()">Register Officer</button>
      </div>
    </div>
    <div class="lock-note">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <p>All officer logins are recorded with IST timestamps. Unauthorized access is flagged automatically.</p>
    </div>
  </div>
</div>
<script>
async function doLogin(){
  const oid=document.getElementById('oid').value.trim();
  const pw=document.getElementById('opw').value;
  const a=document.getElementById('alertBox'); a.className='alert';
  if(!oid||!pw){a.textContent='Enter Officer ID and password.';a.className='alert err';return;}
  const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='Verifying...';
  try{
    const r=await fetch('/api/officer/login',{
      method:'POST',headers:{'Content-Type':'application/json'},
      credentials:'include',body:JSON.stringify({officer_id:oid,password:pw})
    });
    const d=await r.json();
    if(d.success){
      // Store both session and token for maximum compatibility
      sessionStorage.setItem('officer',JSON.stringify({
        officer_id:d.officer_id, name:d.name, designation:d.designation, token:d.token||''
      }));
      if(d.election_active){
        a.textContent='⚠️ Active election — some management features are locked.';
        a.className='alert warn';
        btn.textContent='Entering portal...';
        setTimeout(()=>{location.href='/officer-portal';},1200);
      } else {
        location.href='/officer-portal';
      }
    } else {
      a.textContent=d.message; a.className='alert err';
      btn.disabled=false; btn.textContent='Login to Officer Portal →';
    }
  } catch(e){
    a.textContent='Server error. Is the server running?'; a.className='alert err';
    btn.disabled=false; btn.textContent='Login to Officer Portal →';
  }
}
async function doRegister(){
  const a=document.getElementById('regAlert'); a.className='alert';
  try{
    const r=await fetch('/api/officer/register',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({officer_id:document.getElementById('noid').value.trim(),
        name:document.getElementById('noname').value.trim(),
        designation:document.getElementById('nodesig').value.trim(),
        password:document.getElementById('nopw').value,
        secret_code:document.getElementById('nocode').value})});
    const d=await r.json();
    a.textContent=d.message; a.className='alert '+(d.success?'ok':'err');
  } catch(e){a.textContent='Error: '+e.message; a.className='alert err';}
}
</script>
</body>
</html>
